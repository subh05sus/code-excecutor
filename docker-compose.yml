services:
  code-executor:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "6000:3000"
      - "6001:3001"
    environment:
      - INTERNAL_TOKEN=${INTERNAL_TOKEN}
      - NODE_ENV=production
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/jobs:/tmp/jobs:z
    restart: unless-stopped
